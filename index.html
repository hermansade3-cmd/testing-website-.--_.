<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SadeGPTFire — AI ya Zimamoto & Uokoaji Tanzania</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --f1:#FF4500;--f2:#FF6D00;--f3:#FFAB40;--f4:#FFD180;
  --ember:#FF1744;--gold:#FFC400;
  --bg:#05050A;--bg2:#09090F;--bg3:#0E0E18;--panel:#0B0B14;
  --card:#131320;--card2:#181828;
  --border:#1E1E30;--border2:#252540;
  --text:#EEF0FF;--text2:#9AA0C0;--muted:#4A5070;
  --green:#00E676;--teal:#00BCD4;--blue:#448AFF;
  --purple:#CE93D8;--cyan:#18FFFF;
  --red:#FF1744;--yellow:#FFD740;--orange:#FF9100;
  --glow:0 0 40px rgba(255,69,0,0.4);
  --glow2:0 0 80px rgba(255,69,0,0.15);
  --sidebar-w:280px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Exo 2',sans-serif;
  display:flex;flex-direction:column;
  background-image:
    radial-gradient(ellipse 70% 40% at 50% -10%,rgba(255,69,0,0.10) 0%,transparent 60%),
    radial-gradient(ellipse 30% 25% at 95% 85%,rgba(255,109,0,0.06) 0%,transparent 50%),
    radial-gradient(ellipse 40% 30% at 5% 60%,rgba(255,23,68,0.04) 0%,transparent 50%);
}

/* ─── PARTICLES ─── */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.spark{position:absolute;bottom:-10px;border-radius:50%;background:var(--f1);animation:rise linear infinite;opacity:0;}
@keyframes rise{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  10%{opacity:1;}90%{opacity:0.3;}
  100%{transform:translateY(-100vh) translateX(var(--drift));opacity:0;}
}

/* ─── HEADER ─── */
header{
  position:relative;z-index:100;flex-shrink:0;
  background:linear-gradient(180deg,rgba(15,15,25,0.98) 0%,rgba(10,10,18,0.95) 100%);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,69,0,0.25);
  box-shadow:0 4px 50px rgba(255,69,0,0.18), 0 1px 0 rgba(255,109,0,0.12);
  display:flex;align-items:center;height:68px;
}
.header-glow{
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--f2) 30%,var(--f3) 50%,var(--f2) 70%,transparent 100%);
  background-size:200% 100%;
  animation:hglow 5s linear infinite;
}
@keyframes hglow{0%{background-position:100% 0}100%{background-position:-100% 0}}

.header-left{display:flex;align-items:center;gap:14px;padding:0 22px;border-right:1px solid var(--border);height:100%;}
.fire-logo{
  width:44px;height:44px;
  background:linear-gradient(135deg,#FF5500,#FF1744);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;position:relative;overflow:hidden;
  box-shadow:0 0 25px rgba(255,69,0,0.55),inset 0 1px 0 rgba(255,255,255,0.12);
  animation:lp 3s ease-in-out infinite;
}
@keyframes lp{0%,100%{box-shadow:0 0 20px rgba(255,69,0,0.5);}50%{box-shadow:0 0 40px rgba(255,69,0,0.85),0 0 70px rgba(255,69,0,0.3);}}
.fire-logo::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.18),transparent);border-radius:10px;}
.brand{display:flex;flex-direction:column;gap:1px;}
.brand h1{
  font-family:'Orbitron',sans-serif;font-size:1.45rem;font-weight:900;letter-spacing:3px;
  background:linear-gradient(90deg,#FF6D00,#FFAB40,#FF4500,#FF6D00);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:bs 4s linear infinite;
}
@keyframes bs{0%{background-position:0%}100%{background-position:300%}}
.brand p{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;}

.header-stats{display:flex;align-items:center;padding:0 16px;flex:1;gap:0;}
.hstat{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 18px;border-right:1px solid var(--border);min-width:90px;}
.hstat:last-child{border-right:none;}
.hstat .num{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:var(--f3);}
.hstat .lbl{font-size:0.56rem;color:var(--muted);letter-spacing:2px;font-family:'Share Tech Mono',monospace;}

.header-right{display:flex;align-items:center;gap:10px;padding:0 18px;height:100%;border-left:1px solid var(--border);}
.status-pill{display:flex;align-items:center;gap:7px;background:rgba(0,230,118,0.07);border:1px solid rgba(0,230,118,0.28);padding:5px 12px;border-radius:20px;font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--green);letter-spacing:1px;}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pd 1.5s ease-in-out infinite;box-shadow:0 0 8px var(--green);}
@keyframes pd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.6)}}
.emergency-btn{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,rgba(255,23,68,0.15),rgba(255,69,0,0.1));border:1px solid rgba(255,23,68,0.4);color:#FF7070;padding:7px 13px;border-radius:8px;font-family:'Orbitron',monospace;font-size:0.72rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:all 0.2s;animation:ep 2s ease-in-out infinite;}
@keyframes ep{0%,100%{box-shadow:0 0 8px rgba(255,23,68,0.2);}50%{box-shadow:0 0 22px rgba(255,23,68,0.55);}}
.emergency-btn:hover{background:rgba(255,23,68,0.25);border-color:var(--red);color:#fff;transform:scale(1.03);}

/* ─── MAIN LAYOUT ─── */
.main{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}

/* ─── SIDEBAR ─── */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:12px 14px 8px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--card) 0%,var(--panel) 100%);}
.sidebar-top span{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--f2);letter-spacing:2.5px;text-transform:uppercase;}
.sidebar-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.sidebar-scroll::-webkit-scrollbar{width:3px;}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border2);}

/* Search box in sidebar */
.sb-search{margin:10px 12px;position:relative;}
.sb-search input{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:8px 12px 8px 32px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:0.8rem;outline:none;transition:border-color 0.2s;}
.sb-search input:focus{border-color:rgba(255,69,0,0.4);}
.sb-search input::placeholder{color:var(--muted);}
.sb-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:0.85rem;opacity:0.5;}

.section-label{padding:10px 14px 5px;font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}

.qbtn{display:flex;align-items:flex-start;gap:10px;width:100%;background:transparent;border:none;border-left:2px solid transparent;color:var(--text2);padding:8px 12px;text-align:left;font-family:'Exo 2',sans-serif;font-size:0.8rem;cursor:pointer;transition:all 0.18s;line-height:1.3;}
.qbtn:hover{background:rgba(255,69,0,0.07);border-left-color:var(--f1);color:var(--f3);}
.qbtn .icon{font-size:0.95rem;flex-shrink:0;margin-top:1px;}
.qbtn .txt{display:flex;flex-direction:column;gap:1px;}
.qbtn .txt small{font-size:0.62rem;color:var(--muted);display:block;}

.emerg-box{margin:8px 12px;background:linear-gradient(135deg,rgba(255,23,68,0.1),rgba(255,69,0,0.07));border:1px solid rgba(255,23,68,0.22);border-radius:10px;padding:12px 14px;text-align:center;}
.emerg-box .enum{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--red);letter-spacing:4px;text-shadow:0 0 20px rgba(255,23,68,0.5);}
.emerg-box .etxt{font-size:0.62rem;color:var(--muted);letter-spacing:2px;font-family:'Share Tech Mono',monospace;margin-top:2px;}
.emerg-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px;}
.emerg-num{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:5px 8px;text-align:center;cursor:pointer;transition:all 0.2s;}
.emerg-num:hover{background:rgba(255,69,0,0.1);border-color:var(--f1);}
.emerg-num .en{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:var(--f3);}
.emerg-num .el{font-size:0.56rem;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;}

/* Stat card */
.stat-card{margin:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.stat-row2{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.74rem;}
.stat-row2:last-child{border-bottom:none;}
.stat-row2 .slabel{color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:0.6rem;letter-spacing:1px;}
.sval.fire{color:var(--f3);}
.sval.green{color:var(--green);}
.sval.blue{color:var(--blue);}
.sval.teal{color:var(--teal);}
.sval.purple{color:var(--purple);}

/* ─── CHAT AREA ─── */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Topic filter bar */
.topic-bar{flex-shrink:0;padding:8px 18px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;align-items:center;}
.topic-bar::-webkit-scrollbar{display:none;}
.topic-bar-label{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--muted);letter-spacing:2px;white-space:nowrap;}
.topic-chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:20px;font-size:0.7rem;cursor:pointer;white-space:nowrap;font-family:'Exo 2',sans-serif;transition:all 0.18s;}
.topic-chip:hover,.topic-chip.active{background:rgba(255,69,0,0.12);border-color:rgba(255,69,0,0.4);color:var(--f3);}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:22px 26px;display:flex;flex-direction:column;gap:18px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.msg{display:flex;gap:12px;animation:mi 0.35s cubic-bezier(0.16,1,0.3,1);}
@keyframes mi{from{opacity:0;transform:translateY(14px) scale(0.98);}to{opacity:1;transform:none;}}
.msg.user{flex-direction:row-reverse;}

.av{width:38px;height:38px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;position:relative;}
.av.bot-av{background:linear-gradient(135deg,var(--f1),var(--ember));box-shadow:0 0 16px rgba(255,69,0,0.4),inset 0 1px 0 rgba(255,255,255,0.15);}
.av.bot-av::after{content:'';position:absolute;inset:-3px;border-radius:13px;border:1px solid rgba(255,69,0,0.3);animation:ar 2s linear infinite;}
@keyframes ar{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}
.av.user-av{background:var(--card2);border:1px solid var(--border2);}

.msg-content{display:flex;flex-direction:column;gap:4px;max-width:74%;}
.msg.user .msg-content{align-items:flex-end;}
.msg-meta{display:flex;align-items:center;gap:7px;font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--muted);}
.msg.user .msg-meta{flex-direction:row-reverse;}
.sender-name{color:var(--f2);letter-spacing:1px;}

.bubble{padding:13px 17px;border-radius:12px;font-size:0.88rem;line-height:1.78;position:relative;}
.msg.bot .bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,0.35);}
.msg.bot .bubble::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--f1),var(--f2),transparent);border-radius:12px 12px 0 0;}
.msg.user .bubble{background:linear-gradient(135deg,rgba(255,69,0,0.12),rgba(255,109,0,0.07));border:1px solid rgba(255,69,0,0.22);border-top-right-radius:4px;box-shadow:0 4px 20px rgba(255,69,0,0.08);}
.bubble strong{color:var(--f3);}
.bubble em{color:var(--teal);font-style:normal;}
.bubble .hl-green{color:var(--green);}
.bubble .hl-blue{color:var(--blue);}
.bubble .hl-red{color:var(--red);}
.bubble .hl-yellow{color:var(--yellow);}

/* Info box inside bubble */
.info-box{background:rgba(68,138,255,0.07);border:1px solid rgba(68,138,255,0.2);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:0.83rem;}
.warn-box{background:rgba(255,215,64,0.07);border:1px solid rgba(255,215,64,0.2);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:0.83rem;}
.danger-box{background:rgba(255,23,68,0.07);border:1px solid rgba(255,23,68,0.2);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:0.83rem;}
.safe-box{background:rgba(0,230,118,0.07);border:1px solid rgba(0,230,118,0.2);border-radius:8px;padding:10px 14px;margin:10px 0;font-size:0.83rem;}

.step-list{list-style:none;padding:0;margin:8px 0;}
.step-list li{display:flex;gap:10px;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.85rem;}
.step-list li:last-child{border-bottom:none;}
.step-num{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--f1),var(--ember));display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;flex-shrink:0;margin-top:1px;font-family:'Orbitron',sans-serif;}

.tag-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-family:'Share Tech Mono',monospace;font-size:0.58rem;letter-spacing:1px;margin-bottom:8px;font-weight:700;}
.tag-pill.danger{background:rgba(255,23,68,0.12);border:1px solid rgba(255,23,68,0.35);color:#FF6B6B;}
.tag-pill.safe{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:var(--green);}
.tag-pill.info{background:rgba(68,138,255,0.1);border:1px solid rgba(68,138,255,0.3);color:var(--blue);}
.tag-pill.warn{background:rgba(255,215,64,0.1);border:1px solid rgba(255,215,64,0.3);color:var(--yellow);}
.tag-pill.purple{background:rgba(206,147,216,0.1);border:1px solid rgba(206,147,216,0.3);color:var(--purple);}

/* Typing */
.typing-row{display:none;gap:12px;align-items:center;}
.typing-row.show{display:flex;}
.typing-bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:4px;border-radius:12px;padding:13px 17px;display:flex;gap:5px;align-items:center;}
.typing-bubble span{width:7px;height:7px;border-radius:50%;background:var(--f2);animation:td 1.4s ease-in-out infinite;}
.typing-bubble span:nth-child(2){animation-delay:0.2s;}
.typing-bubble span:nth-child(3){animation-delay:0.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:0.5}30%{transform:translateY(-6px);opacity:1}}

/* Welcome grid */
.welcome-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.wcard{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;cursor:pointer;transition:all 0.2s;font-size:0.78rem;color:var(--text2);display:flex;align-items:center;gap:8px;}
.wcard:hover{background:rgba(255,69,0,0.1);border-color:rgba(255,69,0,0.3);color:var(--f3);transform:translateY(-1px);}

/* ─── INPUT AREA ─── */
.input-section{flex-shrink:0;background:rgba(9,9,15,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:12px 18px 14px;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.input-box{flex:1;position:relative;background:var(--card);border:1px solid var(--border2);border-radius:12px;transition:border-color 0.2s,box-shadow 0.2s;overflow:hidden;}
.input-box:focus-within{border-color:rgba(255,69,0,0.45);box-shadow:0 0 0 3px rgba(255,69,0,0.08),0 0 24px rgba(255,69,0,0.1);}
.input-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,69,0,0.35),transparent);opacity:0;transition:opacity 0.2s;}
.input-box:focus-within::before{opacity:1;}
textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:'Exo 2',sans-serif;font-size:0.9rem;padding:11px 15px;resize:none;outline:none;min-height:46px;max-height:120px;line-height:1.6;}
textarea::placeholder{color:var(--muted);}

.input-actions{display:flex;gap:6px;align-items:center;padding:6px 10px;border-top:1px solid var(--border);}
.ia-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:0.8rem;padding:4px 8px;border-radius:6px;transition:all 0.2s;font-family:'Exo 2',sans-serif;display:flex;align-items:center;gap:5px;}
.ia-btn:hover{color:var(--f3);background:rgba(255,69,0,0.08);}
.ia-spacer{flex:1;}

.btn-send{flex-shrink:0;width:50px;height:50px;background:linear-gradient(135deg,var(--f1),var(--ember));border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 18px rgba(255,69,0,0.4);transition:all 0.2s;position:relative;overflow:hidden;}
.btn-send::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);}
.btn-send:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,69,0,0.6);}
.btn-send:active{transform:translateY(0);}
.btn-send:disabled{opacity:0.4;transform:none;cursor:default;}

.input-hint{margin-top:5px;text-align:center;font-size:0.6rem;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
.input-hint span{color:rgba(255,69,0,0.55);}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:28px;max-width:440px;width:90%;box-shadow:0 20px 80px rgba(0,0,0,0.6),0 0 40px rgba(255,69,0,0.12);}
.modal h2{font-family:'Orbitron',sans-serif;font-size:1.1rem;color:var(--f3);margin-bottom:12px;letter-spacing:2px;}
.modal p{color:var(--text2);font-size:0.85rem;line-height:1.7;margin-bottom:16px;}
.modal-nums{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.modal-num{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s;}
.modal-num:hover{border-color:var(--f1);background:rgba(255,69,0,0.08);}
.modal-num .mn{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;color:var(--red);}
.modal-num .ml{font-size:0.65rem;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;margin-top:2px;}
.modal-close{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text2);padding:10px;border-radius:8px;cursor:pointer;font-family:'Exo 2',sans-serif;font-size:0.85rem;transition:all 0.2s;}
.modal-close:hover{background:rgba(255,255,255,0.08);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}

/* RESPONSIVE */
@media (max-width:768px){
  .sidebar{display:none;}
  .hstat{display:none;}
  .brand h1{font-size:1.1rem;}
  .messages{padding:14px;}
}
</style>
</head>
<body>

<div id="particles"></div>

<!-- EMERGENCY MODAL -->
<div class="modal-overlay" id="emergModal">
  <div class="modal">
    <h2>🚨 DHARURA — PIGA SIMU SASA</h2>

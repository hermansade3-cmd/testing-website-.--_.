<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASOMO YA ZIMAMOTO PRO</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#b91c1c;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.search-box{
    padding:20px;
    text-align:center;
}

input{
    width:90%;
    max-width:400px;
    padding:12px;
    border-radius:8px;
    border:none;
    font-size:16px;
}

button{
    padding:12px 20px;
    background:#dc2626;
    border:none;
    color:white;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
}

.result{
    padding:20px;
    max-width:800px;
    margin:auto;
}

canvas{
    background:white;
    margin-top:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
🔥 MASOMO YA ZIMAMOTO PRO 🔥
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Andika swali la zimamoto... mfano: Fire Triangle">
<br>
<button onclick="tafuta()">TAFUTA</button>
</div>

<div class="result" id="result"></div>

<script>

function tafuta(){
    let swali = document.getElementById("search").value.toLowerCase();
    let result = document.getElementById("result");
    result.innerHTML = "";

    if(swali.includes("fire triangle")){
        result.innerHTML = `
        <h2>Fire Triangle</h2>
        <p>Fire Triangle ina vitu vitatu muhimu ili moto uwake:</p>
        <ul>
        <li>Joto (Heat)</li>
        <li>Oksijeni (Oxygen)</li>
        <li>Mafuta (Fuel)</li>
        </ul>
        <canvas id="mchoro" width="300" height="300"></canvas>
        `;
        choraTriangle();
    }

    else if(swali.includes("daraja")){
        result.innerHTML = `
        <h2>Daraja za Moto</h2>
        <p><b>Daraja A:</b> Vitu vigumu kama mbao</p>
        <p><b>Daraja B:</b> Vimiminika kama petroli</p>
        <p><b>Daraja C:</b> Gesi</p>
        <p><b>Daraja D:</b> Metali</p>
        `;
    }

    else if(swali.includes("extinguisher")){
        result.innerHTML = `
        <h2>Aina za Fire Extinguisher</h2>
        <ul>
        <li>Water</li>
        <li>Foam</li>
        <li>CO2</li>
        <li>Dry Powder</li>
        </ul>
        `;
    }

    else{
        result.innerHTML = "<h3>Hakuna jibu lililopatikana. Jaribu swali lingine la zimamoto.</h3>";
    }
}

function choraTriangle(){
    const canvas = document.getElementById("mchoro");
    const ctx = canvas.getContext("2d");

    ctx.beginPath();
    ctx.moveTo(150,50);
    ctx.lineTo(50,250);
    ctx.lineTo(250,250);
    ctx.closePath();

    ctx.strokeStyle = "red";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.font = "16px Arial";
    ctx.fillStyle = "black";
    ctx.fillText("HEAT",130,40);
    ctx.fillText("OXYGEN",20,270);
    ctx.fillText("FUEL",200,270);
}

</script>

</body>
</html>

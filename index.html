<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        
        #container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        canvas {
            border: 3px solid #fff;
            background-color: #000;
            display: block;
        }
        
        #scoreboard {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            z-index: 10;
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="scoreboard">Player: 0 | Computer: 0</div>
        <canvas id="pong" width="800" height="600"></canvas>
        <div id="instructions">
            Mouse or Arrow Keys (Up/Down) to Control Left Paddle
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        
        // Game Constants
        const PADDLE_WIDTH = 10;
        const PADDLE_HEIGHT = 100;
        const BALL_RADIUS = 8;
        const PADDLE_SPEED = 6;
        const COMPUTER_SPEED = 5.5;
        
        // Player Paddle (Left)
        const player = {
            x: 15,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dy: 0,
            score: 0
        };
        
        // Computer Paddle (Right)
        const computer = {
            x: canvas.width - 15 - PADDLE_WIDTH,
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            width: PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dy: 0,
            score: 0
        };
        
        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: BALL_RADIUS,
            dx: 5,
            dy: 5,
            speed: 5
        };
        
        // Input handling
        const keys = {};
        
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            player.y = Math.max(0, Math.min(mouseY - PADDLE_HEIGHT / 2, canvas.height - PADDLE_HEIGHT));
        });
        
        // Draw Functions
        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }
        
        function drawCircle(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawCenterLine() {
            ctx.strokeStyle = '#444';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }
        
        function updateScore() {
            document.getElementById('scoreboard').innerText = 
                `Player: ${player.score} | Computer: ${computer.score}`;
        }
        
        // Physics and Collision Detection
        function checkPaddleCollision(paddleObj) {
            if (ball.x - ball.radius < paddleObj.x + paddleObj.width &&
                ball.x + ball.radius > paddleObj.x &&
                ball.y - ball.radius < paddleObj.y + paddleObj.height &&
                ball.y + ball.radius > paddleObj.y) {
                
                // Reverse ball direction
                ball.dx *= -1;
                
                // Add spin based on where ball hits the paddle
                const paddleCenter = paddleObj.y + paddleObj.height / 2;
                const deltaY = ball.y - paddleCenter;
                ball.dy += deltaY * 0.2;
                
                // Increase speed slightly
                ball.speed += 0.5;
                ball.dx = ball.dx > 0 ? ball.speed : -ball.speed;
            }
        }
        
        function updateBall() {
            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // Wall collision (top and bottom)
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy *= -1;
                // Clamp ball position to prevent getting stuck
                if (ball.y - ball.radius < 0) ball.y = ball.radius;
                if (ball.y + ball.radius > canvas.height) ball.y = canvas.height - ball.radius;
            }
            
            // Paddle collision
            checkPaddleCollision(player);
            checkPaddleCollision(computer);
            
            // Scoring
            if (ball.x - ball.radius < 0) {
                computer.score++;
                resetBall();
                updateScore();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                resetBall();
                updateScore();
            }
        }
        
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = 5;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() * 2 - 1) * ball.speed;
        }
        
        function updatePlayer() {
            // Arrow keys movement
            if (keys['ArrowUp']) {
                player.y = Math.max(0, player.y - PADDLE_SPEED);
            }
            if (keys['ArrowDown']) {
                player.y = Math.min(canvas.height - PADDLE_HEIGHT, player.y + PADDLE_SPEED);
            }
        }
        
        function updateComputer() {
            // Simple AI: follow the ball
            const computerCenter = computer.y + PADDLE_HEIGHT / 2;
            const difference = ball.y - computerCenter;
            
            // Add some delay to make it beatable
            if (Math.abs(difference) > 35) {
                if (difference > 0) {
                    computer.y = Math.min(canvas.height - PADDLE_HEIGHT, computer.y + COMPUTER_SPEED);
                } else {
                    computer.y = Math.max(0, computer.y - COMPUTER_SPEED);
                }
            }
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw center line
            drawCenterLine();
            
            // Draw paddles
            drawRect(player.x, player.y, player.width, player.height, '#fff');
            drawRect(computer.x, computer.y, computer.width, computer.height, '#fff');
            
            // Draw ball
            drawCircle(ball.x, ball.y, ball.radius, '#fff');
        }
        
        function gameLoop() {
            updatePlayer();
            updateComputer();
            updateBall();
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Start the game
        updateScore();
        gameLoop();
    </script>
</body>
</html>
